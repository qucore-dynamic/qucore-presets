name: CI (Multi-Service Check)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint check
        run: npm run lint

      # - name: Build project
      #   run: npm run build
      #   env:
      #     AUTH_URL: ${{ secrets.AUTH_URL }}
      #     NEXT_PUBLIC_SITE: ${{ secrets.NEXT_PUBLIC_SITE }}
      #     PORT: ${{ secrets.PORT }}
      #     MODE: 'prod'

      - name: Run tests
        run: npm test -- --passWithNoTests
